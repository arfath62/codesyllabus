<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeSyllabus - Brutalist Developer Skillsets & Code Playground</title>
    <!-- Google Fonts for crisp modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
      /* Apply gorgeous neo-brutalist fonts globally */
      body {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      }
      code, pre, textarea {
        font-family: 'Fira Code', monospace !important;
      }

      /* Neo-Brutalist Utility rules */
      .brutalist-card {
        border: 4px solid #000000 !important;
        box-shadow: 6px 6px 0px 0px #000000 !important;
        transition: all 0.15s ease-in-out;
      }
      .brutalist-card:hover {
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0px 0px #000000 !important;
      }

      .brutalist-btn {
        border: 4px solid #000000 !important;
        box-shadow: 3px 3px 0px 0px #000000 !important;
        transition: all 0.1s ease-in-out;
      }
      .brutalist-btn:hover {
        transform: translate(-1.5px, -1.5px);
        box-shadow: 4.5px 4.5px 0px 0px #000000 !important;
      }
      .brutalist-btn:active {
        transform: translate(1.5px, 1.5px);
        box-shadow: 0px 0px 0px 0px #000000 !important;
      }

      /* Cybernetic hazard stripe blocks */
      .hazard-stripes {
        background: repeating-linear-gradient(
          45deg,
          #facc15,
          #facc15 10px,
          #000000 10px,
          #000000 20px
        );
      }

      /* Custom retro grid terminal scrollbars */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #f5f5f4;
        border-left: 3px solid #000000;
      }
      ::-webkit-scrollbar-thumb {
        background: #000000;
        border: 2px solid #f5f5f4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
